<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Manage Users - Ascent Logistics</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
  <script src="auth.js"></script>
</head>
<body class="bg-slate-100 font-sans">

  <nav class="bg-slate-900 h-14 flex items-center justify-between px-6">
    <div class="flex items-center gap-3 text-slate-200 font-medium text-base">
      <i class="ti ti-truck-delivery text-blue-400 text-xl"></i>
      Ascent Logistics and Transport
    </div>
    <div id="navUser" class="flex items-center gap-3"></div>
  </nav>

  <div class="flex">
    <aside class="bg-slate-800 w-48 min-h-screen pt-4">
      <div id="sidebar"></div>
    </aside>

    <main class="flex-1 p-6">
      <div class="flex items-center justify-between mb-5">
        <h1 class="text-lg font-medium text-slate-700">Manage Users</h1>
        <button onclick="openModal()" class="flex items-center gap-2 bg-blue-600 hover:bg-blue-700 text-white text-sm px-4 py-2 rounded-lg">
          <i class="ti ti-plus"></i> Add User
        </button>
      </div>

      <!-- STATS -->
      <div class="grid grid-cols-4 gap-4 mb-6">
        <div class="bg-white rounded-lg border border-slate-200 p-4">
          <p class="text-xs text-slate-500 mb-1">Total users</p>
          <p class="text-2xl font-medium text-slate-800" id="totalUsers">0</p>
        </div>
        <div class="bg-white rounded-lg border border-slate-200 p-4">
          <p class="text-xs text-slate-500 mb-1">Managers</p>
          <p class="text-2xl font-medium text-blue-500" id="totalManagers">0</p>
        </div>
        <div class="bg-white rounded-lg border border-slate-200 p-4">
          <p class="text-xs text-slate-500 mb-1">Operators</p>
          <p class="text-2xl font-medium text-green-500" id="totalOperators">0</p>
        </div>
        <div class="bg-white rounded-lg border border-slate-200 p-4">
          <p class="text-xs text-slate-500 mb-1">Drivers</p>
          <p class="text-2xl font-medium text-yellow-500" id="totalDrivers">0</p>
        </div>
      </div>

      <!-- ERROR / SUCCESS -->
      <div id="alertMsg" class="hidden mb-4 px-4 py-3 rounded-lg text-sm"></div>

      <!-- USERS TABLE -->
      <div class="bg-white rounded-lg border border-slate-200 overflow-hidden">
        <table class="w-full text-sm">
          <thead>
            <tr class="bg-slate-50 border-b border-slate-200">
              <th class="text-left px-4 py-3 text-xs text-slate-500 font-medium">Name</th>
              <th class="text-left px-4 py-3 text-xs text-slate-500 font-medium">Email</th>
              <th class="text-left px-4 py-3 text-xs text-slate-500 font-medium">Role</th>
              <th class="text-left px-4 py-3 text-xs text-slate-500 font-medium">Status</th>
              <th class="text-left px-4 py-3 text-xs text-slate-500 font-medium">Created</th>
              <th class="text-left px-4 py-3 text-xs text-slate-500 font-medium">Actions</th>
            </tr>
          </thead>
          <tbody id="usersTable">
            <tr><td colspan="6" class="text-center py-8 text-slate-400 text-sm">Loading users...</td></tr>
          </tbody>
        </table>
      </div>
    </main>
  </div>

  <!-- ADD USER MODAL -->
  <div id="modal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50">
    <div class="bg-white rounded-xl p-6 w-full max-w-md shadow-xl">
      <div class="flex items-center justify-between mb-5">
        <h2 class="text-base font-medium text-slate-700">Add New User</h2>
        <button onclick="closeModal()" class="text-slate-400 hover:text-slate-600"><i class="ti ti-x text-lg"></i></button>
      </div>
      <div id="modalError" class="hidden mb-3 bg-red-50 border border-red-200 text-red-600 text-xs px-3 py-2 rounded-lg"></div>
      <div class="flex flex-col gap-3">
        <input id="newName" type="text" placeholder="Full name" class="border border-slate-200 rounded-lg px-3 py-2 text-sm outline-none focus:border-blue-400" />
        <input id="newEmail" type="email" placeholder="Email address" class="border border-slate-200 rounded-lg px-3 py-2 text-sm outline-none focus:border-blue-400" />
        <input id="newPassword" type="password" placeholder="Password" class="border border-slate-200 rounded-lg px-3 py-2 text-sm outline-none focus:border-blue-400" />
        <select id="newRole" class="border border-slate-200 rounded-lg px-3 py-2 text-sm outline-none focus:border-blue-400">
          <option value="">Select role</option>
          <option value="manager">Manager</option>
          <option value="operator">Operator</option>
          <option value="driver">Driver</option>
        </select>
        <button onclick="addUser()" id="addUserBtn" class="bg-blue-600 hover:bg-blue-700 text-white text-sm py-2 rounded-lg mt-1">
          Create User
        </button>
      </div>
    </div>
  </div>

  <script>
    

    const user = checkAuth();
    if (user) {
      buildSidebar(user);
      buildNav(user);
      loadUsers();
    }

    async function loadUsers() {
      try {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/users?select=*&order=created_at.desc`, {
          headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
        });
        const users = await res.json();
        renderUsers(users);
        updateStats(users);
      } catch (err) {
        document.getElementById('usersTable').innerHTML =
          '<tr><td colspan="6" class="text-center py-8 text-red-400 text-sm">Failed to load users.</td></tr>';
      }
    }

    function getRoleBadge(role) {
      const colors = {
        admin: 'bg-purple-100 text-purple-700',
        manager: 'bg-blue-100 text-blue-700',
        operator: 'bg-green-100 text-green-700',
        driver: 'bg-yellow-100 text-yellow-700',
      };
      return `<span class="text-xs px-2 py-1 rounded-full font-medium ${colors[role] || 'bg-slate-100 text-slate-600'} capitalize">${role}</span>`;
    }

    function renderUsers(users) {
      const tbody = document.getElementById('usersTable');
      if (users.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" class="text-center py-8 text-slate-400 text-sm">No users found.</td></tr>';
        return;
      }
      tbody.innerHTML = users.map(u => `
        <tr class="border-b border-slate-100 hover:bg-slate-50">
          <td class="px-4 py-3 text-slate-700 font-medium">${u.full_name}</td>
          <td class="px-4 py-3 text-slate-500">${u.email}</td>
          <td class="px-4 py-3">${getRoleBadge(u.role)}</td>
          <td class="px-4 py-3">
            ${u.active
              ? '<span class="bg-green-100 text-green-700 text-xs px-2 py-1 rounded-full">Active</span>'
              : '<span class="bg-red-100 text-red-700 text-xs px-2 py-1 rounded-full">Inactive</span>'}
          </td>
          <td class="px-4 py-3 text-slate-400 text-xs">${new Date(u.created_at).toLocaleDateString()}</td>
          <td class="px-4 py-3 flex gap-2">
            ${u.role !== 'admin' ? `
              <button onclick="toggleUser('${u.id}', ${u.active})" class="${u.active ? 'text-yellow-500 hover:text-yellow-700' : 'text-green-500 hover:text-green-700'} text-xs flex items-center gap-1">
                <i class="ti ${u.active ? 'ti-ban' : 'ti-check'}"></i> ${u.active ? 'Disable' : 'Enable'}
              </button>
              <button onclick="deleteUser('${u.id}')" class="text-red-400 hover:text-red-600 text-xs flex items-center gap-1">
                <i class="ti ti-trash"></i> Delete
              </button>
            ` : '<span class="text-xs text-slate-300">Protected</span>'}
          </td>
        </tr>
      `).join('');
    }

    function updateStats(users) {
      document.getElementById('totalUsers').textContent = users.length;
      document.getElementById('totalManagers').textContent = users.filter(u => u.role === 'manager').length;
      document.getElementById('totalOperators').textContent = users.filter(u => u.role === 'operator').length;
      document.getElementById('totalDrivers').textContent = users.filter(u => u.role === 'driver').length;
    }

    async function addUser() {
      const full_name = document.getElementById('newName').value.trim();
      const email = document.getElementById('newEmail').value.trim();
      const password = document.getElementById('newPassword').value.trim();
      const role = document.getElementById('newRole').value;
      const modalError = document.getElementById('modalError');
      const btn = document.getElementById('addUserBtn');

      if (!full_name || !email || !password || !role) {
        modalError.textContent = 'Please fill all fields.';
        modalError.classList.remove('hidden');
        return;
      }

      btn.textContent = 'Creating...';
      btn.disabled = true;

      try {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/users`, {
          method: 'POST',
          headers: {
            'apikey': SUPABASE_KEY,
            'Authorization': `Bearer ${SUPABASE_KEY}`,
            'Content-Type': 'application/json',
            'Prefer': 'return=minimal'
          },
          body: JSON.stringify({ full_name, email, password, role, active: true })
        });

        if (res.ok) {
          closeModal();
          showAlert('User created successfully!', 'green');
          loadUsers();
        } else {
          const err = await res.json();
          modalError.textContent = err.message?.includes('unique') ? 'Email already exists.' : 'Failed to create user.';
          modalError.classList.remove('hidden');
        }
      } catch (err) {
        modalError.textContent = 'Connection error. Try again.';
        modalError.classList.remove('hidden');
      }

      btn.textContent = 'Create User';
      btn.disabled = false;
    }

    async function toggleUser(id, currentActive) {
      await fetch(`${SUPABASE_URL}/rest/v1/users?id=eq.${id}`, {
        method: 'PATCH',
        headers: {
          'apikey': SUPABASE_KEY,
          'Authorization': `Bearer ${SUPABASE_KEY}`,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ active: !currentActive })
      });
      showAlert(`User ${currentActive ? 'disabled' : 'enabled'} successfully.`, currentActive ? 'yellow' : 'green');
      loadUsers();
    }

    async function deleteUser(id) {
      if (!confirm('Are you sure you want to delete this user?')) return;
      await fetch(`${SUPABASE_URL}/rest/v1/users?id=eq.${id}`, {
        method: 'DELETE',
        headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
      });
      showAlert('User deleted.', 'red');
      loadUsers();
    }

    function showAlert(msg, color) {
      const el = document.getElementById('alertMsg');
      const colors = {
        green: 'bg-green-50 border border-green-200 text-green-700',
        red: 'bg-red-50 border border-red-200 text-red-700',
        yellow: 'bg-yellow-50 border border-yellow-200 text-yellow-700',
      };
      el.className = `mb-4 px-4 py-3 rounded-lg text-sm ${colors[color]}`;
      el.textContent = msg;
      el.classList.remove('hidden');
      setTimeout(() => el.classList.add('hidden'), 3000);
    }

    function openModal() {
      document.getElementById('modal').style.display = 'flex';
      document.getElementById('modalError').classList.add('hidden');
      document.getElementById('newName').value = '';
      document.getElementById('newEmail').value = '';
      document.getElementById('newPassword').value = '';
      document.getElementById('newRole').value = '';
    }

    function closeModal() {
      document.getElementById('modal').style.display = 'none';
    }
  </script>
</body>
</html>
