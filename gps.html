<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GPS Tracking - Ascent Logistics</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="auth.js"></script>
</head>
<body class="bg-slate-100 font-sans">

  <nav class="bg-slate-900 h-14 flex items-center justify-between px-6">
    <div class="flex items-center gap-3 text-slate-200 font-medium text-base">
      <i class="ti ti-truck-delivery text-blue-400 text-xl"></i>
      Ascent Logistics and Transport
    </div>
    <div id="navUser" class="flex items-center gap-3"></div>
  </nav>

  <div class="flex">
    <aside class="bg-slate-800 w-48 min-h-screen pt-4">
      <div id="sidebar"></div>
    </aside>

    <main class="flex-1 p-6">
      <div class="flex items-center justify-between mb-5">
        <h1 class="text-lg font-medium text-slate-700">GPS Tracking</h1>
        <div class="flex items-center gap-2">
          <div class="w-2 h-2 rounded-full bg-green-400 animate-pulse"></div>
          <span class="text-xs text-slate-500">Live tracking active</span>
        </div>
      </div>

      <!-- STAT CARDS -->
      <div class="grid grid-cols-4 gap-4 mb-5">
        <div class="bg-white rounded-lg border border-slate-200 p-4">
          <p class="text-xs text-slate-500 mb-1">Active drivers</p>
          <p class="text-2xl font-medium text-slate-800">4</p>
          <p class="text-xs text-green-500 mt-1">On the road</p>
        </div>
        <div class="bg-white rounded-lg border border-slate-200 p-4">
          <p class="text-xs text-slate-500 mb-1">Deliveries today</p>
          <p class="text-2xl font-medium text-slate-800">12</p>
          <p class="text-xs text-blue-400 mt-1">In progress</p>
        </div>
        <div class="bg-white rounded-lg border border-slate-200 p-4">
          <p class="text-xs text-slate-500 mb-1">Completed</p>
          <p class="text-2xl font-medium text-green-500">8</p>
          <p class="text-xs text-green-400 mt-1">Delivered</p>
        </div>
        <div class="bg-white rounded-lg border border-slate-200 p-4">
          <p class="text-xs text-slate-500 mb-1">Delayed</p>
          <p class="text-2xl font-medium text-red-500">1</p>
          <p class="text-xs text-red-400 mt-1">Needs attention</p>
        </div>
      </div>

      <div class="flex gap-5">

        <!-- MAP -->
        <div class="flex-1">
          <div id="map" class="rounded-xl border border-slate-200 overflow-hidden" style="height: 480px;"></div>
        </div>

        <!-- DRIVER LIST -->
        <div class="w-72 flex flex-col gap-3">
          <p class="text-sm font-medium text-slate-600">Active drivers</p>
          <div id="driverList" class="flex flex-col gap-3"></div>
        </div>

      </div>

      <!-- DELIVERIES TABLE -->
      <p class="text-sm font-medium text-slate-600 mt-6 mb-3">Today's deliveries</p>
      <div class="bg-white rounded-lg border border-slate-200 overflow-hidden">
        <table class="w-full text-sm">
          <thead>
            <tr class="bg-slate-50 border-b border-slate-200">
              <th class="text-left px-4 py-3 text-xs text-slate-500 font-medium">Order ID</th>
              <th class="text-left px-4 py-3 text-xs text-slate-500 font-medium">Driver</th>
              <th class="text-left px-4 py-3 text-xs text-slate-500 font-medium">Destination</th>
              <th class="text-left px-4 py-3 text-xs text-slate-500 font-medium">ETA</th>
              <th class="text-left px-4 py-3 text-xs text-slate-500 font-medium">Status</th>
            </tr>
          </thead>
          <tbody id="deliveriesTable"></tbody>
        </table>
      </div>

    </main>
  </div>

  <script>
    const user = checkAuth();
    if (user) {
      buildSidebar(user);
      buildNav(user);
    }

    // Drivers data with Morocco locations
    const drivers = [
      { id: 1, name: 'Youssef Alami', vehicle: 'Truck 01', plate: '12345-A-1', lat: 33.5731, lng: -7.5898, status: 'delivering', speed: '62 km/h', destination: 'Casablanca - Client A', eta: '14:30', order: 'ORD-001', color: '#3b82f6' },
      { id: 2, name: 'Karim Benali', vehicle: 'Truck 02', plate: '67890-B-2', lat: 34.0209, lng: -6.8416, status: 'delivering', speed: '75 km/h', destination: 'Rabat - Client B', eta: '15:00', order: 'ORD-002', color: '#10b981' },
      { id: 3, name: 'Hassan Tazi', vehicle: 'Truck 03', plate: '11223-C-3', lat: 31.6295, lng: -7.9811, status: 'delayed', speed: '0 km/h', destination: 'Marrakech - Client C', eta: '16:45', order: 'ORD-003', color: '#ef4444' },
      { id: 4, name: 'Omar Idrissi', vehicle: 'Truck 04', plate: '44556-D-4', lat: 35.7595, lng: -5.8340, status: 'delivering', speed: '58 km/h', destination: 'Tanger - Client D', eta: '17:15', order: 'ORD-004', color: '#f59e0b' },
    ];

    const deliveries = [
      { id: 'ORD-001', driver: 'Youssef Alami', destination: 'Casablanca - Client A', eta: '14:30', status: 'delivering' },
      { id: 'ORD-002', driver: 'Karim Benali', destination: 'Rabat - Client B', eta: '15:00', status: 'delivering' },
      { id: 'ORD-003', driver: 'Hassan Tazi', destination: 'Marrakech - Client C', eta: '16:45', status: 'delayed' },
      { id: 'ORD-004', driver: 'Omar Idrissi', destination: 'Tanger - Client D', eta: '17:15', status: 'delivering' },
      { id: 'ORD-005', driver: 'Youssef Alami', destination: 'Agadir - Client E', eta: '18:00', status: 'completed' },
      { id: 'ORD-006', driver: 'Karim Benali', destination: 'Fes - Client F', eta: '13:00', status: 'completed' },
    ];

    // Init map centered on Morocco
    const map = L.map('map').setView([32.0, -6.0], 6);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap'
    }).addTo(map);

    // Add warehouse marker
    const warehouseIcon = L.divIcon({
      html: `<div style="background:#0f172a;border:2px solid #3b82f6;border-radius:8px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#60a5fa" stroke-width="2">
          <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
          <polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
      </div>`,
      className: '',
      iconSize: [32, 32],
      iconAnchor: [16, 16]
    });
    L.marker([33.5731, -7.5898], { icon: warehouseIcon })
      .addTo(map)
      .bindPopup('<b>Ascent Main Warehouse</b><br>Casablanca, Morocco');

    // Add driver markers
    const markers = {};
    drivers.forEach(driver => {
      const icon = L.divIcon({
        html: `<div style="background:${driver.color};border:2px solid white;border-radius:50%;width:36px;height:36px;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,0.3);">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="white">
            <path d="M1 3h15v13H1zM16 8h4l3 3v5h-7V8z"/>
            <circle cx="5.5" cy="18.5" r="2.5" fill="white"/>
            <circle cx="18.5" cy="18.5" r="2.5" fill="white"/>
          </svg>
        </div>`,
        className: '',
        iconSize: [36, 36],
        iconAnchor: [18, 18]
      });

      const marker = L.marker([driver.lat, driver.lng], { icon })
        .addTo(map)
        .bindPopup(`
          <div style="font-family:sans-serif;min-width:180px;">
            <p style="font-weight:600;margin:0 0 4px">${driver.name}</p>
            <p style="color:#64748b;font-size:12px;margin:0 0 2px">${driver.vehicle} · ${driver.plate}</p>
            <p style="color:#64748b;font-size:12px;margin:0 0 2px">Speed: ${driver.speed}</p>
            <p style="color:#64748b;font-size:12px;margin:0 0 2px">→ ${driver.destination}</p>
            <p style="color:#64748b;font-size:12px;margin:0">ETA: ${driver.eta}</p>
          </div>
        `);
      markers[driver.id] = marker;
    });

    // Render driver list
    function renderDriverList() {
      const statusColors = {
        delivering: 'bg-green-100 text-green-700',
        delayed: 'bg-red-100 text-red-700',
        idle: 'bg-slate-100 text-slate-600',
      };
      document.getElementById('driverList').innerHTML = drivers.map(d => `
        <div class="bg-white border border-slate-200 rounded-xl p-4 cursor-pointer hover:border-blue-300 transition-all"
          onclick="focusDriver(${d.id})">
          <div class="flex items-center justify-between mb-2">
            <p class="text-sm font-medium text-slate-700">${d.name}</p>
            <span class="text-xs px-2 py-0.5 rounded-full ${statusColors[d.status]} capitalize">${d.status}</span>
          </div>
          <p class="text-xs text-slate-400 mb-1"><i class="ti ti-truck mr-1"></i>${d.vehicle} · ${d.plate}</p>
          <p class="text-xs text-slate-400 mb-1"><i class="ti ti-map-pin mr-1"></i>${d.destination}</p>
          <div class="flex items-center justify-between mt-2">
            <p class="text-xs text-slate-400"><i class="ti ti-clock mr-1"></i>ETA: ${d.eta}</p>
            <p class="text-xs font-medium text-blue-500">${d.speed}</p>
          </div>
        </div>
      `).join('');
    }

    // Render deliveries table
    function renderDeliveries() {
      const statusBadge = {
        delivering: '<span class="bg-blue-100 text-blue-700 text-xs px-2 py-1 rounded-full">Delivering</span>',
        delayed: '<span class="bg-red-100 text-red-700 text-xs px-2 py-1 rounded-full">Delayed</span>',
        completed: '<span class="bg-green-100 text-green-700 text-xs px-2 py-1 rounded-full">Completed</span>',
      };
      document.getElementById('deliveriesTable').innerHTML = deliveries.map(d => `
        <tr class="border-b border-slate-100 hover:bg-slate-50">
          <td class="px-4 py-3 text-slate-500">${d.id}</td>
          <td class="px-4 py-3 text-slate-700 font-medium">${d.driver}</td>
          <td class="px-4 py-3 text-slate-600">${d.destination}</td>
          <td class="px-4 py-3 text-slate-600">${d.eta}</td>
          <td class="px-4 py-3">${statusBadge[d.status]}</td>
        </tr>
      `).join('');
    }

    function focusDriver(id) {
      const driver = drivers.find(d => d.id === id);
      if (!driver) return;
      map.setView([driver.lat, driver.lng], 10);
      markers[id].openPopup();
    }

    // Simulate live movement
    function simulateMovement() {
      drivers.forEach(driver => {
        if (driver.status === 'delivering') {
          driver.lat += (Math.random() - 0.5) * 0.01;
          driver.lng += (Math.random() - 0.5) * 0.01;
          markers[driver.id].setLatLng([driver.lat, driver.lng]);
        }
      });
    }

    renderDriverList();
    renderDeliveries();
    setInterval(simulateMovement, 3000);
  </script>

</body>
</html>
